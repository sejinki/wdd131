<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="character-information-card">
    <meta name="author" content="sejinki">
    <title>Character Card</title>
    <meta property="og:type" content="website">
    <meta property="og:title" content="Character Card">
    <meta property="og:description" content="Interactive RPG character card with health, level, and attack features.">
    <meta property="og:url" content="sejinki.github.io/wdd131/character-card/character.html">
    <link rel="stylesheet" href="character.css">
    <link rel="icon" href="/favicon.png" type="image/png">
    <script defer src="character.js"></script>
</head>

<body>

    <div class="card">
        <img src="character.webp" alt="Character Image" class="image" id="charImage">

        <div class="name" id="charName">Hero</div>

        <div class="stats" id="charStats">
            <p>Class: <span id="charClass">Warrior</span></p>
            <p>Level: <span id="charLevel">1</span></p>
            <p>Health: <span id="charHealth">100</span></p>
        </div>

        <div class="buttons">
            <button id="attackBtn">Attack</button>
            <button id="levelUpBtn">Level Up</button>
        </div>
    </div>

</body>

</html>
