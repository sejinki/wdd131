<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Book</title>

    <meta name="description" content="Browse delicious recipes like apple crisp and more from our recipe collection.">
    <meta name="author" content="sejinki">

    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">


    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipe Book">
    <meta property="og:description"
        content="Browse delicious recipes like apple crisp and more from our recipe collection.">
    <meta property="og:url" content="https://sejinki.github.io/wdd131/recipes/recipes.html">

    <link rel="stylesheet" href="recipes.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&display=swap" rel="stylesheet">
</head>

<body>

    <header class="header">

        <div class="logo-title">
            <img src="images/recipe-book.png" alt="recipe book logo">
            <h1>RecipeBook</h1>
        </div>

    </header>

    <section class="search">
        <input type="text" placeholder="Find a recipe">
        <button>
            <img src="images/search.svg" alt="search icon">
        </button>
    </section>

    <main>

        <article class="recipe">

            <img src="images/apple-crisp.jpg" alt="Apple crisp dessert">

            <div class="recipe-content">

                <span class="tag">dessert</span>

                <h2>Apple Crisp</h2>

                <span class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
                    <span aria-hidden="true">⭐</span>
                    <span aria-hidden="true">⭐</span>
                    <span aria-hidden="true">⭐</span>
                    <span aria-hidden="true">⭐</span>
                    <span aria-hidden="true">☆</span>
                </span>

                <p class="description">
                    This apple crisp recipe is a simple yet delicious fall dessert that's great served warm with vanilla
                    ice cream.
                </p>

            </div>

        </article>

    </main>

    <footer>

        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
            Recipe icons created by Freepik - Flaticon
        </a>

        <div class="social">

            <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
            <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
            <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>

        </div>

    </footer>

</body>

</html>
